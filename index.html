<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>チェックリスト</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .input-area { margin-bottom: 20px; }
        .controls { margin-top: 10px; }
        ul { list-style: none; padding: 0; }
        li { 
            display: flex; align-items: center; 
            margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #eee;
        }
        .item-text { margin: 0 10px; flex-grow: 1; }
        .delete-btn { 
            background-color: #ff4d4d; color: white; border: none; 
            padding: 5px 10px; cursor: pointer; border-radius: 3px;
        }
        input:checked + .item-text { text-decoration: line-through; color: #888; }
        .save-btn { background-color: #4CAF50; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <h2>マイ・チェックリスト</h2>

    <div class="input-area">
        <input type="text" id="todoInput" placeholder="項目を入力してください">
        <button onclick="addItem()">追加</button>
    </div>

    <ul id="todoList"></ul>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">データを保存する</button>
        
    </div>

    <script>
        // ページを読み込んだ時に保存データを表示
        window.onload = function() {
            loadData();
        };

        function addItem(text = "", isChecked = false) {
            const input = document.getElementById('todoInput');
            const itemText = text || input.value.trim();

            if (itemText === "") return;

            const li = document.createElement('li');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = isChecked;

            const span = document.createElement('span');
            span.className = 'item-text';
            span.textContent = itemText;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '削除';
            deleteBtn.onclick = () => li.remove();

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            document.getElementById('todoList').appendChild(li);

            input.value = "";
        }

        // データをブラウザに保存
        function saveData() {
            const items = [];
            document.querySelectorAll('#todoList li').forEach(li => {
                items.push({
                    text: li.querySelector('.item-text').textContent,
                    checked: li.querySelector('input[type="checkbox"]').checked
                });
            });
            // 配列を文字列に変換して保存
            localStorage.setItem('myTodoList', JSON.stringify(items));
            alert("保存しました");
        }

        // 保存されたデータを読み込む
        function loadData() {
            const data = localStorage.getItem('myTodoList');
            if (data) {
                const items = JSON.parse(data);
                items.forEach(item => addItem(item.text, item.checked));
            }
        }
    </script>
</body>
</html>
